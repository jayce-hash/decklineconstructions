<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gallery | Deckline Constructions</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <nav id="navbar"><a href="index.html" class="nav-logo"><div class="nav-logo-mark">D</div> Deckline</a><ul class="nav-links"><li><a href="index.html">Home</a></li><li><a href="services.html">Services</a></li><li><a href="gallery.html" style="color: var(--accent);">Gallery</a></li><li><a href="about.html">About</a></li><li><a href="contact.html">Contact</a></li></ul><a href="contact.html" class="btn btn-accent" style="padding: 0.75rem 1.5rem;">Get a Quote</a></nav>

  <main style="padding-top: 80px; background: var(--bg-light);">
    <section class="hero-global" style="height: 40vh; min-height: 300px; background: var(--bg-dark);">
      <div class="container hero-content reveal text-center">
        <span class="section-label">Our Work</span>
        <h1 style="margin-bottom: 1rem;">Project Gallery</h1>
        <p style="max-width: 600px; margin: 0 auto; color: rgba(255,255,255,0.8);">Browse our recent deck builds across Sydney's Sutherland Shire and beyond.</p>
      </div>
    </section>

    <section style="padding: 6rem 0;">
      <div class="container">
        <div style="display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 1.5rem;">
          <div class="reveal" style="border-radius: var(--radius-md); overflow: hidden; aspect-ratio: 4/3;"><img src="/api/placeholder/800/600" style="width: 100%; height: 100%; object-fit: cover;"></div>
          <div class="reveal delay-1" style="border-radius: var(--radius-md); overflow: hidden; aspect-ratio: 4/3;"><img src="/api/placeholder/800/600" style="width: 100%; height: 100%; object-fit: cover;"></div>
          <div class="reveal delay-2" style="border-radius: var(--radius-md); overflow: hidden; aspect-ratio: 4/3;"><img src="/api/placeholder/800/600" style="width: 100%; height: 100%; object-fit: cover;"></div>
          <div class="reveal" style="border-radius: var(--radius-md); overflow: hidden; aspect-ratio: 4/3;"><img src="/api/placeholder/800/600" style="width: 100%; height: 100%; object-fit: cover;"></div>
          <div class="reveal delay-1" style="border-radius: var(--radius-md); overflow: hidden; aspect-ratio: 4/3;"><img src="/api/placeholder/800/600" style="width: 100%; height: 100%; object-fit: cover;"></div>
          <div class="reveal delay-2" style="border-radius: var(--radius-md); overflow: hidden; aspect-ratio: 4/3;"><img src="/api/placeholder/800/600" style="width: 100%; height: 100%; object-fit: cover;"></div>
        </div>
      </div>
    </section>
  </main>
  
  <footer style="background: var(--bg-pitch); color: rgba(255,255,255,0.7); padding: 5rem 1.5rem 2rem;">
    <div style="text-align: center;">© 2026 Deckline Constructions. All rights reserved. ABN: 12 345 678 901</div>
  </footer>
  <script>window.addEventListener('scroll', () => { document.getElementById('navbar').classList.toggle('scrolled', window.scrollY > 50); }); const observer = new IntersectionObserver((entries) => { entries.forEach(e => { if (e.isIntersecting) { e.target.classList.add('visible'); }}); }, { threshold: 0.1 }); document.querySelectorAll('.reveal').forEach(el => observer.observe(el));</script>
</body>
</html>

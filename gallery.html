<main style="padding-top: 80px; background: var(--bg-pitch); min-height: 100vh;">
  <header style="color: white; padding: 6rem 1.5rem; text-align: center;">
    <div class="container reveal">
      <span class="section-label">Our Masterpieces</span>
      <h1 style="margin-bottom: 1rem;">The Portfolio.</h1>
      <p style="max-width: 600px; margin: 0 auto; color: rgba(255,255,255,0.7);">A curated selection of our finest installations across Greater Sydney.</p>
    </div>
  </header>

  <section style="padding-bottom: 8rem;">
    <div class="container">
      <div style="display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 1.5rem;">
        
        <div class="reveal" style="border-radius: var(--radius-md); overflow: hidden; aspect-ratio: 4/3; position: relative;">
          <img src="/api/placeholder/800/600" style="width: 100%; height: 100%; object-fit: cover; transition: transform 0.5s var(--ease);" onmouseover="this.style.transform='scale(1.05)'" onmouseout="this.style.transform='scale(1)'">
        </div>
        <div class="reveal delay-1" style="border-radius: var(--radius-md); overflow: hidden; aspect-ratio: 4/3; position: relative;">
          <img src="/api/placeholder/800/600" style="width: 100%; height: 100%; object-fit: cover; transition: transform 0.5s var(--ease);" onmouseover="this.style.transform='scale(1.05)'" onmouseout="this.style.transform='scale(1)'">
        </div>
        <div class="reveal delay-2" style="border-radius: var(--radius-md); overflow: hidden; aspect-ratio: 4/3; position: relative;">
          <img src="/api/placeholder/800/600" style="width: 100%; height: 100%; object-fit: cover; transition: transform 0.5s var(--ease);" onmouseover="this.style.transform='scale(1.05)'" onmouseout="this.style.transform='scale(1)'">
        </div>
        <div class="reveal" style="border-radius: var(--radius-md); overflow: hidden; aspect-ratio: 4/3; position: relative;">
          <img src="/api/placeholder/800/600" style="width: 100%; height: 100%; object-fit: cover; transition: transform 0.5s var(--ease);" onmouseover="this.style.transform='scale(1.05)'" onmouseout="this.style.transform='scale(1)'">
        </div>
        <div class="reveal delay-1" style="border-radius: var(--radius-md); overflow: hidden; aspect-ratio: 4/3; position: relative;">
          <img src="/api/placeholder/800/600" style="width: 100%; height: 100%; object-fit: cover; transition: transform 0.5s var(--ease);" onmouseover="this.style.transform='scale(1.05)'" onmouseout="this.style.transform='scale(1)'">
        </div>
        <div class="reveal delay-2" style="border-radius: var(--radius-md); overflow: hidden; aspect-ratio: 4/3; position: relative;">
          <img src="/api/placeholder/800/600" style="width: 100%; height: 100%; object-fit: cover; transition: transform 0.5s var(--ease);" onmouseover="this.style.transform='scale(1.05)'" onmouseout="this.style.transform='scale(1)'">
        </div>

      </div>
    </div>
  </section>
</main>

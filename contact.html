<main style="padding-top: 120px; background: var(--bg-light); padding-bottom: 8rem;">
  <div class="container">
    <div style="text-align: center; margin-bottom: 4rem;" class="reveal">
      <span class="section-label">Connect</span>
      <h1>Let's start building.</h1>
      <p style="max-width: 500px; margin: 1rem auto 0;">Drop us a line for a free, itemised structural quote. We reply within 24 hours.</p>
    </div>

    <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(350px, 1fr)); gap: 4rem; max-width: 1000px; margin: 0 auto; align-items: start;">
      
      <div class="reveal">
        <div style="margin-bottom: 2.5rem;">
          <h3 style="font-size: 0.85rem; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text-muted); margin-bottom: 0.5rem;">Direct Line</h3>
          <a href="tel:0451668761" style="font-size: 1.75rem; font-weight: 700; color: var(--text-dark); text-decoration: none;">0451 668 761</a>
        </div>

        <div style="margin-bottom: 2.5rem;">
          <h3 style="font-size: 0.85rem; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text-muted); margin-bottom: 0.5rem;">Email</h3>
          <a href="mailto:info@deckline.com.au" style="font-size: 1.25rem; font-weight: 600; color: var(--accent); text-decoration: none;">info@deckline.com.au</a>
        </div>

        <div style="margin-bottom: 2.5rem;">
          <h3 style="font-size: 0.85rem; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text-muted); margin-bottom: 0.5rem;">Location</h3>
          <p style="font-size: 1rem; color: var(--text-dark); font-weight: 500;">Sutherland Shire<br>Sydney, NSW</p>
        </div>
      </div>

      <div class="reveal delay-1" style="background: var(--surface-light); padding: 3rem; border-radius: var(--radius-lg); border: 1px solid var(--border-light); box-shadow: 0 20px 40px rgba(0,0,0,0.03);">
        <form onsubmit="event.preventDefault(); this.querySelector('button').textContent = 'Message Sent ✓'; this.querySelector('button').style.background = '#28a745';">
          
          <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1rem;">
            <input type="text" placeholder="First Name" required style="width: 100%; background: var(--bg-light); border: 1px solid var(--border-light); padding: 1rem; border-radius: 8px; font-size: 1rem; font-family: inherit; outline: none;" onfocus="this.style.borderColor='var(--accent)'" onblur="this.style.borderColor='var(--border-light)'">
            <input type="text" placeholder="Last Name" required style="width: 100%; background: var(--bg-light); border: 1px solid var(--border-light); padding: 1rem; border-radius: 8px; font-size: 1rem; font-family: inherit; outline: none;" onfocus="this.style.borderColor='var(--accent)'" onblur="this.style.borderColor='var(--border-light)'">
          </div>
          
          <input type="tel" placeholder="Phone Number" required style="width: 100%; background: var(--bg-light); border: 1px solid var(--border-light); padding: 1rem; border-radius: 8px; font-size: 1rem; font-family: inherit; margin-bottom: 1rem; outline: none;" onfocus="this.style.borderColor='var(--accent)'" onblur="this.style.borderColor='var(--border-light)'">
          
          <select required style="width: 100%; background: var(--bg-light); border: 1px solid var(--border-light); padding: 1rem; border-radius: 8px; font-size: 1rem; font-family: inherit; margin-bottom: 1rem; outline: none; appearance: none; cursor: pointer;" onfocus="this.style.borderColor='var(--accent)'" onblur="this.style.borderColor='var(--border-light)'">
            <option value="" disabled selected>Service Required</option>
            <option value="timber">Timber Decking</option>
            <option value="composite">Composite Decking</option>
            <option value="pool">Pool Decking</option>
          </select>
          
          <textarea placeholder="Tell us about your project..." required style="width: 100%; background: var(--bg-light); border: 1px solid var(--border-light); padding: 1rem; border-radius: 8px; font-size: 1rem; font-family: inherit; margin-bottom: 1.5rem; outline: none; resize: vertical; min-height: 120px;" onfocus="this.style.borderColor='var(--accent)'" onblur="this.style.borderColor='var(--border-light)'"></textarea>
          
          <button type="submit" class="btn btn-accent" style="width: 100%;">Submit Request</button>
        </form>
      </div>

    </div>
  </div>
</main>
